<!DOCTYPE html>

<html>
  <head>
    <meta charset="utf-8" />
    <title>Lit Starter Kit</title>
  </head>
  <body>
    <nav>
      <a href="/dev/index.html">Component Demo</a> | <a href="/dev/avatar.html">mu-avatar Demo</a> |
      <a href="/dev/button.html">mu-button Demo</a> |
      <a href="/dev/icon.html">mu-icon Demo</a>
    </nav>

    <!-- Test components -->
    <script type="module">
      import './src/avatar/mu-avatar.js';
      import './src/button/mu-button.js';
      import './src/icon/mu-icon.js';
    </script>

    <h2>mu-avatar</h2>
    <mu-avatar
      initials="AB"
      size="medium"
      color="primary"
    ></mu-avatar>
    <mu-avatar
      src="https://i.pravatar.cc/100"
      alt="Avatar"
      size="large"
      color="secondary"
    ></mu-avatar>

    <h2>mu-button</h2>
    <mu-button
      size="medium"
      color="primary"
      >Accessible Button</mu-button
    >
    <mu-button
      size="small"
      color="success"
      variant="outlined"
      >Small Outlined</mu-button
    >
    <mu-button
      size="large"
      color="error"
      variant="icon"
    >
      <mu-icon
        name="star"
        color="warning"
      ></mu-icon>
    </mu-button>

    <h2>mu-icon</h2>
    <mu-icon
      name="check_circle"
      color="success"
    ></mu-icon>
    <mu-icon
      name="error"
      color="error"
      size="large"
    ></mu-icon>
  </body>
</html>
