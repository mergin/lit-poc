<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>mu-file-upload Demo</title>
    <link
      rel="stylesheet"
      href="/dev/demo.css"
    />
    <style>
      main {
        display: flex;
        flex-direction: column;
        gap: 2rem;
        max-width: 500px;
      }
      section {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      h2 {
        margin: 0;
        font-size: 0.85rem;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body>
    <header class="demo-header">
      <a
        class="back-link"
        href="/dev/index.html"
        >Back to dev index</a
      >
      <h1>mu-file-upload Demo</h1>
    </header>

    <main>
      <section>
        <h2>Basic</h2>
        <mu-file-upload
          id="basic"
          label="Choose file"
          name="file"
        ></mu-file-upload>
      </section>

      <section>
        <h2>Multiple Files</h2>
        <mu-file-upload
          id="multiple"
          label="Choose files"
          multiple
          name="files"
        ></mu-file-upload>
      </section>

      <section>
        <h2>Images Only</h2>
        <mu-file-upload
          id="images"
          label="Choose image"
          accept="image/*"
          name="image"
        ></mu-file-upload>
      </section>

      <section>
        <h2>Disabled</h2>
        <mu-file-upload
          id="disabled"
          label="Choose file"
          disabled
        ></mu-file-upload>
      </section>
    </main>

    <script type="module">
      import '/src/file-upload/mu-file-upload.js';

      document.querySelectorAll('mu-file-upload').forEach((el) => {
        el.addEventListener('mu-change', (e) => {
          console.log('mu-change', el.id, e.detail.files);
        });
      });
    </script>
  </body>
</html>
