<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>mu-tabs</title>
    <link
      rel="stylesheet"
      href="/dev/demo.css"
    />
    <style>
      body {
        font-family: sans-serif;
        padding: 24px;
      }

      main {
        display: flex;
        flex-direction: column;
        gap: 32px;
      }
    </style>
  </head>
  <body>
    <header class="demo-header">
      <a
        class="back-link"
        href="/dev/index.html"
        >Back to dev index</a
      >
      <h1>mu-tabs</h1>
    </header>

    <main>
      <section>
        <h2>Default</h2>
        <mu-tabs selectedIndex="0">
          <mu-tab slot="tab">Tab 1</mu-tab>
          <mu-tab slot="tab">Tab 2</mu-tab>
          <mu-tab slot="tab">Tab 3</mu-tab>
          <mu-tab-panel slot="panel">Content for Tab 1</mu-tab-panel>
          <mu-tab-panel slot="panel">Content for Tab 2</mu-tab-panel>
          <mu-tab-panel slot="panel">Content for Tab 3</mu-tab-panel>
        </mu-tabs>
      </section>

      <section>
        <h2>Vertical</h2>
        <mu-tabs orientation="vertical">
          <mu-tab slot="tab">Profile</mu-tab>
          <mu-tab slot="tab">Security</mu-tab>
          <mu-tab slot="tab">Notifications</mu-tab>
          <mu-tab-panel slot="panel">Profile content</mu-tab-panel>
          <mu-tab-panel slot="panel">Security settings</mu-tab-panel>
          <mu-tab-panel slot="panel">Notification preferences</mu-tab-panel>
        </mu-tabs>
      </section>
    </main>

    <script
      type="module"
      src="/src/core/components/tabs/mu-tabs.ts"
    ></script>
    <script
      type="module"
      src="/src/core/components/tabs/mu-tab.ts"
    ></script>
    <script
      type="module"
      src="/src/core/components/tabs/mu-tab-panel.ts"
    ></script>
  </body>
</html>
