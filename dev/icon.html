<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>mu-icon Demo</title>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="/dev/demo.css"
    />
  </head>
  <body>
    <header class="demo-header">
      <a
        class="back-link"
        href="/dev/index.html"

    <script
      type="module"
      src="/src/icon/mu-icon.ts"
    ></script>

    <main>
      <section>
        <h2>Examples</h2>
        <div style="display: flex; gap: 16px; align-items: center">
          <mu-icon

        </div>
      </section>
    </main>
