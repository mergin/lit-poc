<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>mu-select Demo</title>
    <link
      rel="stylesheet"
      href="/dev/demo.css"
    />
  </head>
  <body>
    <header class="demo-header">
      <a
        class="back-link"
        href="/dev/index.html"
        >Back to dev index</a
      >
      <h1>mu-select Demo</h1>
    </header>

    <main>
      <section>
        <h2>States</h2>
        <div style="display: flex; flex-direction: column; gap: 16px; max-width: 400px">
          <mu-select
            id="basic"
            label="Country"
            placeholder="Choose a country"
          ></mu-select>
          <mu-select
            id="has-value"
            label="Framework"
            value="lit"
          ></mu-select>
          <mu-select
            id="error"
            label="Role"
            error="Please select a role"
          ></mu-select>
          <mu-select
            id="disabled"
            label="Disabled"
            disabled
          ></mu-select>
        </div>
      </section>
    </main>

    <script type="module">
      import '/src/select/mu-select.js';

      document.getElementById('basic').options = [
        {value: 'us', label: 'United States'},
        {value: 'gb', label: 'United Kingdom'},
        {value: 'de', label: 'Germany'},
      ];

      document.getElementById('has-value').options = [
        {value: 'react', label: 'React'},
        {value: 'vue', label: 'Vue'},
        {value: 'lit', label: 'Lit'},
      ];

      document.getElementById('error').options = [
        {value: 'admin', label: 'Admin'},
        {value: 'user', label: 'User'},
      ];

      document.getElementById('disabled').options = [{value: 'a', label: 'Option A'}];
    </script>
  </body>
</html>
