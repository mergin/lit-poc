<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>mu-locale-provider</title>
    <link
      rel="stylesheet"
      href="/dev/demo.css"
    />
  </head>
  <body>
    <header class="demo-header">
      <a
        class="back-link"
        href="/dev/index.html"
        >Back to dev index</a
      >
      <h1>mu-locale-provider</h1>
    </header>
    <script
      type="module"
      src="/src/core/components/i18n/mu-locale-provider.ts"
    ></script>
    <script
      type="module"
      src="/src/core/components/chip/mu-chip.ts"
    ></script>
    <script
      type="module"
      src="/src/core/components/badge/mu-badge.ts"
    ></script>
    <script
      type="module"
      src="/src/core/components/snackbar/mu-snackbar.ts"
    ></script>

    <main>
      <section>
        <h2>Default locale (English)</h2>
        <div style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap">
          <mu-chip
            label="Tag"
            deletable
          ></mu-chip>
          <mu-badge content="4"><span>Notifications</span></mu-badge>
          <mu-snackbar
            id="default-snackbar"
            message="File saved"
            open
          ></mu-snackbar>
        </div>
      </section>

      <section>
        <h2>Custom locale (German) via mu-locale-provider</h2>
        <mu-locale-provider id="german-provider">
          <div style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap">
            <mu-chip
              id="german-chip"
              label="Schlagwort"
              deletable
            ></mu-chip>
            <mu-badge
              id="german-badge"
              content="7"
              ><span>Benachrichtigungen</span></mu-badge
            >
            <mu-snackbar
              id="german-snackbar"
              message="Datei gespeichert"
              open
            ></mu-snackbar>
          </div>
        </mu-locale-provider>
      </section>
    </main>

    <script type="module">
      const provider = document.getElementById('german-provider');
      provider.locale = {
        chip: {deleteLabel: (label) => `Entfernen ${label}`},
        badge: {defaultLabel: (content) => `Ausweis: ${content}`},
        dialog: {closeLabel: 'Schließen'},
        snackbar: {closeLabel: 'Verwerfen'},
      };
    </script>
  </body>
</html>
