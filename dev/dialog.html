<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>mu-dialog dev</title>
  </head>
  <body style="padding: 24px; font-family: sans-serif">
    <h2>Dialog</h2>

    <button id="open-btn">Open dialog</button>

    <mu-dialog
      id="my-dialog"
      headline="Confirm action"
    >
      <p>Are you sure you want to proceed? This action cannot be undone.</p>
      <button
        slot="actions"
        id="cancel-btn"
      >
        Cancel
      </button>
      <button
        slot="actions"
        id="confirm-btn"
      >
        Confirm
      </button>
    </mu-dialog>

    <script type="module">
      import '/src/dialog/mu-dialog.js';

      const dialog = document.getElementById('my-dialog');
      document.getElementById('open-btn').addEventListener('click', () => {
        dialog.open = true;
      });
      document.getElementById('cancel-btn').addEventListener('click', () => {
        dialog.open = false;
      });
      document.getElementById('confirm-btn').addEventListener('click', () => {
        dialog.open = false;
      });
      dialog.addEventListener('mu-open', () => console.log('mu-open fired'));
      dialog.addEventListener('mu-close', () => console.log('mu-close fired'));
    </script>
  </body>
</html>
