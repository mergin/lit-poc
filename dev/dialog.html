<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>mu-dialog</title>
    <link
      rel="stylesheet"
      href="/dev/demo.css"
    />
  </head>
  <body>
    <header class="demo-header">
      <a
        class="back-link"
        href="/dev/index.html"
        >Back to dev index</a
      >
      <h1>mu-dialog</h1>
    </header>

    <main>
      <section>
        <h2>Interactive Example</h2>
        <button id="open-btn">Open dialog</button>

        <mu-dialog
          id="my-dialog"
          headline="Confirm action"
        >
          <p>Are you sure you want to proceed? This action cannot be undone.</p>
          <button
            slot="actions"
            id="cancel-btn"
          >
            Cancel
          </button>
          <button
            slot="actions"
            id="confirm-btn"
          >
            Confirm
          </button>
        </mu-dialog>
      </section>
    </main>

    <script type="module">
      import '/src/core/components/dialog/mu-dialog.ts';

      const dialog = document.getElementById('my-dialog');
      document.getElementById('open-btn').addEventListener('click', () => {
        dialog.open = true;
      });
      document.getElementById('cancel-btn').addEventListener('click', () => {
        dialog.open = false;
      });
      document.getElementById('confirm-btn').addEventListener('click', () => {
        dialog.open = false;
      });
      dialog.addEventListener('mu-open', () => console.log('mu-open fired'));
      dialog.addEventListener('mu-close', () => console.log('mu-close fired'));
    </script>
  </body>
</html>
