<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>mu-stepper dev</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 2rem;
        display: flex;
        flex-direction: column;
        gap: 2rem;
        max-width: 600px;
      }
      section {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      h2 {
        margin: 0;
        font-size: 0.85rem;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .controls {
        display: flex;
        gap: 8px;
      }
    </style>
  </head>
  <body>
    <section>
      <h2>Horizontal Linear</h2>
      <mu-stepper id="basic">
        <mu-step label="Account"><p>Account details go here.</p></mu-step>
        <mu-step label="Profile"><p>Profile info here.</p></mu-step>
        <mu-step label="Review"><p>Review your info.</p></mu-step>
      </mu-stepper>
      <div class="controls">
        <button id="next-btn">Next</button>
        <button id="back-btn">Back</button>
      </div>
    </section>

    <section>
      <h2>Vertical Non-Linear</h2>
      <mu-stepper
        id="vertical"
        orientation="vertical"
        linear="false"
        activeStep="1"
      >
        <mu-step label="Step One"><p>Content 1</p></mu-step>
        <mu-step label="Step Two"><p>Content 2</p></mu-step>
        <mu-step label="Step Three"><p>Content 3</p></mu-step>
      </mu-stepper>
    </section>

    <script type="module">
      import '/src/stepper/mu-stepper.js';
      import '/src/stepper/mu-step.js';

      const stepper = document.querySelector('#basic');

      document.querySelector('#next-btn').addEventListener('click', () => stepper.next());
      document.querySelector('#back-btn').addEventListener('click', () => stepper.back());

      stepper.addEventListener('step-change', (e) => {
        console.log('step-change', e.detail);
      });
    </script>
  </body>
</html>
