<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>mu-switch Demo</title>
    <link
      rel="stylesheet"
      href="/dev/demo.css"
    />
  </head>
  <body>
    <header class="demo-header">
      <a
        class="back-link"
        href="/dev/index.html"
        >Back to dev index</a
      >
      <h1>mu-switch Demo</h1>
    </header>

    <main>
      <section>
        <h2>States</h2>
        <div style="display: flex; flex-direction: column; gap: 16px">
          <mu-switch
            id="basic"
            label="Dark mode"
          ></mu-switch>
          <mu-switch
            id="checked"
            label="Notifications on"
            checked
          ></mu-switch>
          <mu-switch
            id="disabled"
            label="Disabled"
            disabled
          ></mu-switch>
        </div>
      </section>
    </main>

    <script type="module">
      import '/src/switch/mu-switch.js';
    </script>
  </body>
</html>
