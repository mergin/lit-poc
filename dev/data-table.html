<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>mu-data-table</title>
    <link
      rel="stylesheet"
      href="/dev/demo.css"
    />
    <style>
      main {
        display: flex;
        flex-direction: column;
        gap: 2rem;
      }
      section {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      h2 {
        margin: 0;
        font-size: 0.85rem;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body>
    <header class="demo-header">
      <a
        class="back-link"
        href="/dev/index.html"
        >Back to dev index</a
      >
      <h1>mu-data-table</h1>
    </header>

    <main>
      <section>
        <h2>Basic</h2>
        <mu-data-table id="basic"></mu-data-table>
      </section>

      <section>
        <h2>Selectable</h2>
        <mu-data-table
          id="selectable"
          selectable
        ></mu-data-table>
      </section>

      <section>
        <h2>Loading</h2>
        <mu-data-table
          id="loading"
          loading
        ></mu-data-table>
      </section>

      <section>
        <h2>Empty State</h2>
        <mu-data-table id="empty">
          <span slot="empty-state">No records found.</span>
        </mu-data-table>
      </section>
    </main>

    <script type="module">
      import '/src/core/components/data-table/mu-data-table.ts';

      const COLUMNS = [
        {key: 'name', label: 'Name', sortable: true},
        {key: 'role', label: 'Role'},
        {key: 'status', label: 'Status', sortable: true},
      ];

      const ROWS = [
        {name: 'Alice Martin', role: 'Engineer', status: 'Active'},
        {name: 'Bob Smith', role: 'Designer', status: 'Inactive'},
        {name: 'Carol Jones', role: 'Manager', status: 'Active'},
        {name: 'Dave Brown', role: 'Engineer', status: 'Active'},
      ];

      document.querySelectorAll('mu-data-table').forEach((el) => {
        el.columns = COLUMNS;
        if (el.id !== 'empty') {
          el.rows = ROWS;
        }
        el.addEventListener('sort-change', (e) => console.log('sort-change', e.detail));
        el.addEventListener('selection-change', (e) => console.log('selection-change', e.detail));
      });
    </script>
  </body>
</html>
