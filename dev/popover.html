<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>mu-popover</title>
    <link
      rel="stylesheet"
      href="/dev/demo.css"
    />
    <style>
      main {
        display: flex;
        flex-direction: column;
        gap: 2rem;
      }
      section {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      h2 {
        margin: 0;
        font-size: 0.85rem;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body>
    <header class="demo-header">
      <a
        class="back-link"
        href="/dev/index.html"
        >Back to dev index</a
      >
      <h1>mu-popover</h1>
    </header>

    <main>
      <section>
        <h2>Basic</h2>
        <mu-popover id="basic">
          <button slot="trigger">Show popover</button>
          <p style="margin: 0">This is the popover content.</p>
        </mu-popover>
      </section>

      <section>
        <h2>Rich Content</h2>
        <mu-popover id="rich">
          <button slot="trigger">Show info</button>
          <div>
            <strong>Info title</strong>
            <p style="margin: 8px 0 0">More detailed information here.</p>
          </div>
        </mu-popover>
      </section>

      <section style="padding-top: 80px">
        <h2>Top Placement</h2>
        <mu-popover
          id="top"
          placement="top"
        >
          <button slot="trigger">Show above</button>
          <p style="margin: 0">Opens above the trigger.</p>
        </mu-popover>
      </section>
    </main>

    <script type="module">
      import '/src/core/components/popover/mu-popover.ts';

      document.querySelectorAll('mu-popover').forEach((el) => {
        el.addEventListener('mu-open', () => console.log('mu-open', el.id));
        el.addEventListener('mu-close', () => console.log('mu-close', el.id));
      });
    </script>
  </body>
</html>
