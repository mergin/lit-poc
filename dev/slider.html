<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>mu-slider Demo</title>
    <link
      rel="stylesheet"
      href="/dev/demo.css"
    />
    <style>
      main {
        display: flex;
        flex-direction: column;
        gap: 2rem;
        max-width: 500px;
      }
      section {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      h2 {
        margin: 0;
        font-size: 0.85rem;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body>
    <header class="demo-header">
      <a
        class="back-link"
        href="/dev/index.html"
        >Back to dev index</a
      >
      <h1>mu-slider Demo</h1>
    </header>

    <main>
      <section>
        <h2>Basic</h2>
        <mu-slider
          id="basic"
          label="Volume"
          value="30"
        ></mu-slider>
      </section>

      <section>
        <h2>Disabled</h2>
        <mu-slider
          id="disabled"
          label="Disabled"
          value="50"
          disabled
        ></mu-slider>
      </section>

      <section>
        <h2>Custom Step (10)</h2>
        <mu-slider
          id="stepped"
          label="Zoom"
          value="40"
          step="10"
        ></mu-slider>
      </section>

      <section>
        <h2>Custom Range (-50 to 50)</h2>
        <mu-slider
          id="custom-range"
          label="Temperature"
          value="0"
          min="-50"
          max="50"
        ></mu-slider>
      </section>
    </main>

    <script type="module">
      import '/src/slider/mu-slider.js';

      document.querySelectorAll('mu-slider').forEach((el) => {
        el.addEventListener('change', (e) => {
          console.log('change', e.target.id, e.detail);
        });
      });
    </script>
  </body>
</html>
